name: Notify Profile Repo on New Post

on:
  push:
    branches:
      - main
    paths:
      # content/blog/ 하위에 변경이 생길 때만 트리거
      - 'content/blog/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger profile repo update
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.PROFILE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/hyunbeanohh/hyunbeanohh/dispatches \
            -d '{"event_type":"blog-updated","client_payload":{"ref":"${{ github.ref }}","sha":"${{ github.sha }}"}}'
