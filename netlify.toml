[build]
  command = "npm run build:ci"
  publish = "public"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# /draft/* 경로 전체를 Edge Function으로 보호
[[edge_functions]]
  path = "/draft/*"
  function = "draft-guard"

# page-data JSON 직접 접근도 차단 (콘텐츠 노출 방지)
[[edge_functions]]
  path = "/page-data/draft/*"
  function = "draft-guard"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  GATSBY_CPU_COUNT = "2"
  NODE_OPTIONS = "--max-old-space-size=3072"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[[plugins]]
  package = "@netlify/plugin-gatsby"

# Gatsby의 클라이언트 사이드 라우팅을 위한 리다이렉트
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 캐시 헤더 설정
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
